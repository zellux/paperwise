services:
  api:
    image: python:3.12-slim
    working_dir: /app
    command: >
      sh -c "pip install -e .[dev] &&
             uvicorn zapis.api.main:app --host 0.0.0.0 --port 8000 --reload"
    volumes:
      - ../:/app
    env_file:
      - ../.env.example
    ports:
      - "8000:8000"
    depends_on:
      - redis

  worker:
    image: python:3.12-slim
    working_dir: /app
    command: >
      sh -c "pip install -e .[dev] &&
             celery -A zapis.workers.celery_app.celery_app worker --loglevel=INFO"
    volumes:
      - ../:/app
    env_file:
      - ../.env.example
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

