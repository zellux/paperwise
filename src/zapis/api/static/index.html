<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>zapis | AI-Native Documents</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <div class="bg-orb bg-orb-a"></div>
    <div class="bg-orb bg-orb-b"></div>
    <div class="bg-grid"></div>

    <main class="app-shell">
      <aside class="sidebar">
        <p class="eyebrow">zapis / control</p>
        <h1>Document Ops</h1>
        <p class="subhead">Two-pane workspace for ingest, review, parse, and metadata ops.</p>
        <nav class="nav">
          <button class="nav-link active" data-target="section-docs" type="button">Documents</button>
          <button class="nav-link" data-target="section-upload" type="button">Upload</button>
          <button class="nav-link" data-target="section-parse" type="button">Parse</button>
          <button class="nav-link" data-target="section-llm" type="button">LLM Parse</button>
          <button class="nav-link" data-target="section-activity" type="button">Activity</button>
        </nav>
      </aside>

      <section class="content-pane">
        <article id="section-docs" class="panel panel-section view">
          <h2>Documents</h2>
          <div class="actions">
            <button id="refreshDocsBtn" class="btn" type="button">Refresh List</button>
          </div>
          <div class="docs-table-wrap">
            <table class="docs-table">
              <thead>
                <tr>
                  <th>Title</th>
                  <th>Type</th>
                  <th>Correspondent</th>
                  <th>Tags</th>
                  <th>Date</th>
                  <th>Status</th>
                  <th>Action</th>
                </tr>
              </thead>
              <tbody id="docsTableBody">
                <tr>
                  <td colspan="7">No documents loaded.</td>
                </tr>
              </tbody>
            </table>
          </div>
          <form id="docLookupForm" class="inline-form">
            <input
              id="docIdInput"
              name="docIdInput"
              type="text"
              placeholder="Paste document ID"
              required
            />
            <button type="submit" class="btn">Load</button>
          </form>
          <pre id="docOutput" class="output">No document loaded yet.</pre>
        </article>

        <article id="section-upload" class="panel panel-section view view-hidden">
          <h2>Upload Document</h2>
          <form id="uploadForm" class="stack">
            <label class="label" for="ownerId">Owner ID</label>
            <input id="ownerId" name="ownerId" type="text" value="local-user" required />

            <label class="label" for="fileInput">PDF file</label>
            <input id="fileInput" name="fileInput" type="file" accept="application/pdf" required />

            <button type="submit" class="btn btn-primary">Upload</button>
          </form>
        </article>

        <article id="section-parse" class="panel panel-section view view-hidden">
          <h2>Parse</h2>
          <div class="actions">
            <button id="parseNowBtn" class="btn btn-primary" type="button">Parse Now</button>
            <button id="parseFetchBtn" class="btn" type="button">Fetch Parse Result</button>
          </div>
          <pre id="parseOutput" class="output">No parse result yet.</pre>
        </article>

        <article id="section-llm" class="panel panel-section view view-hidden">
          <h2>LLM Parse</h2>
          <div class="actions">
            <button id="llmParseBtn" class="btn btn-primary" type="button">Run LLM Parse</button>
            <button id="llmFetchBtn" class="btn" type="button">Fetch LLM Result</button>
            <button id="taxonomyBtn" class="btn" type="button">Load Taxonomy</button>
          </div>
          <pre id="llmOutput" class="output">No LLM result yet.</pre>
        </article>

        <article id="section-activity" class="panel panel-section view view-hidden">
          <h2>Activity</h2>
          <pre id="activityOutput" class="output">Ready.</pre>
        </article>
      </section>
    </main>

    <script src="/static/app.js" defer></script>
  </body>
</html>
