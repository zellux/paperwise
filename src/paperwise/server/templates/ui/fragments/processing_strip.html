<div class="inflight-strip" data-processing-count="{{ processing_count }}">
  <div class="inflight-copy">
    <div class="inflight-head">
      <span class="inflight-spin" aria-hidden="true"><span></span></span>
      <a class="inflight-title" href="/ui/pending">{{ processing_count|format_number }} document{{ plural }} processing</a>
    </div>
    <div class="inflight-files">
      {% for item in items %}<span>{{ item.filename }}</span>{% endfor %}
    </div>
  </div>
  <div class="inflight-progress" aria-label="Processing stages">
    {% for item in items %}
    <div class="inflight-progress-row">
      <span>{{ item.stage_label }}</span>
      <span class="inflight-progress-track" data-stage="{{ item.stage_key }}">
        <span style="width: {{ item.stage_progress }}%"></span>
      </span>
    </div>
    {% endfor %}
  </div>
  <a class="inflight-close" href="/ui/pending" aria-label="View processing queue">
    <svg class="icon-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
    </svg>
  </a>
</div>
