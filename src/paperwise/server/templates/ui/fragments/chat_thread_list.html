{% if empty_message %}
<p class="thread-empty">{{ empty_message }}</p>
{% else %}
{% for section in sections %}
<section class="thread-group">
  <h4 class="thread-group-label">{{ section.label }}</h4>
  <ul class="thread-list">
    {% for row in section.rows %}
    <li class="thread-item{% if row.active %} active{% endif %}">
      <button type="button" class="thread-button" data-thread-id="{{ row.thread_id }}">
        <span class="thread-title">{{ row.title }}</span>
        <span class="thread-meta">{{ row.meta }}</span>
      </button>
      <button type="button" class="thread-action" data-delete-thread-id="{{ row.thread_id }}" title="Delete chat" aria-label="Delete {{ row.title }}">&times;</button>
    </li>
    {% endfor %}
  </ul>
</section>
{% endfor %}
{% endif %}
