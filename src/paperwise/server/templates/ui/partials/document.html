<article id="section-document" class="panel panel-section view">
          <h2>Document</h2>
          <div class="document-detail-card">
            <div class="document-detail-grid">
              <div class="document-detail-item">
                <span class="document-detail-label">Document ID</span>
                <code id="detailDocId" class="document-detail-value">-</code>
              </div>
              <div class="document-detail-item">
                <span class="document-detail-label">Owner</span>
                <span id="detailOwnerId" class="document-detail-value">-</span>
              </div>
              <div class="document-detail-item">
                <span class="document-detail-label">File Name</span>
                <span id="detailFilename" class="document-detail-value">-</span>
              </div>
              <div class="document-detail-item">
                <span class="document-detail-label">Status</span>
                <span id="detailStatus" class="document-detail-value">-</span>
              </div>
              <div class="document-detail-item">
                <span class="document-detail-label">Created</span>
                <span id="detailCreatedAt" class="document-detail-value">-</span>
              </div>
              <div class="document-detail-item">
                <span class="document-detail-label">OCR Parsed</span>
                <span id="detailOcrParsedAt" class="document-detail-value">-</span>
              </div>
              <div class="document-detail-item">
                <span class="document-detail-label">Content Type</span>
                <span id="detailContentType" class="document-detail-value">-</span>
              </div>
              <div class="document-detail-item">
                <span class="document-detail-label">Size</span>
                <span id="detailSizeBytes" class="document-detail-value">-</span>
              </div>
              <div class="document-detail-item">
                <span class="document-detail-label">Checksum (SHA256)</span>
                <code id="detailChecksum" class="document-detail-value">-</code>
              </div>
            </div>
            <div class="document-detail-item document-detail-item-full">
              <span class="document-detail-label">File Path</span>
              <code id="detailBlobUri" class="document-detail-value document-detail-path">-</code>
            </div>
            <div class="document-detail-item document-detail-item-full">
              <span class="document-detail-label">OCR Content</span>
              <pre id="detailOcrContent" class="document-detail-value document-ocr-preview">-</pre>
            </div>
          </div>
          <form id="documentMetaForm" class="stack">
            <label class="label" for="metaTitle">Title</label>
            <input id="metaTitle" name="metaTitle" type="text" required />

            <label class="label" for="metaDate">Date</label>
            <input id="metaDate" name="metaDate" type="date" />

            <label class="label" for="metaCorrespondent">Correspondent</label>
            <input id="metaCorrespondent" name="metaCorrespondent" type="text" required />

            <label class="label" for="metaType">Document Type</label>
            <input id="metaType" name="metaType" type="text" required />

            <label class="label" for="metaTags">Tags (comma separated)</label>
            <input id="metaTags" name="metaTags" type="text" />

            <div class="actions document-actions">
              <div class="document-actions-left">
                <button id="saveMetadataBtn" type="submit" class="btn btn-primary">Save Metadata</button>
                <button id="viewDocumentFileBtn" type="button" class="btn">View File</button>
                <button id="backToDocsBtn" type="button" class="btn">Back to Documents</button>
              </div>
              <div class="document-actions-right">
                <button id="deleteDocumentBtn" type="button" class="btn btn-muted">
                  Delete Document
                </button>
                <button id="reprocessDocumentBtn" type="button" class="btn btn-muted">
                  Reprocess Document
                </button>
              </div>
            </div>
          </form>
          <section class="document-history-card">
            <h3 class="document-history-title">Edit History</h3>
            <div id="documentHistoryList" class="document-history-list">
              <p class="document-history-empty">No history entries yet.</p>
            </div>
          </section>
        </article>
