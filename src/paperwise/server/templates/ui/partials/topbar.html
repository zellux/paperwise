<header class="topbar">
  <div class="brand-block">
    <button
      id="brandHomeBtn"
      type="button"
      class="brand-home-btn"
      aria-label="Go to documents home"
      title="Go to documents home"
    >
      <img
        src="/static/icons/paperwise-icon.png"
        alt="paperwise logo"
        class="brand-icon"
        width="40"
        height="40"
      />
      <div class="brand-copy">
        <span class="brand-title">paperwise</span>
        <span class="brand-subtitle">AI-Native Documents</span>
      </div>
    </button>
    <nav class="topnav" aria-label="Primary navigation">
      <a class="topnav-link{% if active_nav_href == '/ui/documents' %} active{% endif %}" href="/ui/documents">Documents</a>
      <a class="topnav-link{% if active_nav_href == '/ui/grounded-qa' %} active{% endif %}" href="/ui/grounded-qa">Ask Your Docs</a>
      <a class="topnav-link{% if active_nav_href == '/ui/upload' %} active{% endif %}" href="/ui/upload">Upload</a>
      <a class="topnav-link{% if active_nav_href == '/ui/settings' %} active{% endif %}" href="/ui/settings">Settings</a>
    </nav>
  </div>
  <div class="topbar-actions">
    <form class="topbar-search" action="/ui/documents" method="get">
      <svg class="icon-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input
        name="q"
        type="search"
        placeholder="{% if active_nav_href == '/ui/settings' %}Search settings... ⌘K{% else %}Search documents... ⌘K{% endif %}"
        aria-label="{% if active_nav_href == '/ui/settings' %}Search settings{% else %}Search documents{% endif %}"
      />
    </form>
    <button id="signOutBtn" type="button" class="profile-chip" title="Log out">
      <span class="profile-avatar">PW</span>
      <span id="sessionUserLabel" class="profile-label">Not signed in</span>
    </button>
  </div>
</header>
