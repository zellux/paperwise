<article id="section-activity" class="panel panel-section view">
          <h2>Activity</h2>
          <p id="activityTokenTotal" class="activity-token-total">LLM tokens processed: {{ activity_total_tokens|default(0)|int|format_number }}</p>
          <h3>Recently Processed Documents</h3>
          <div class="docs-table-wrap">
            <table class="docs-table pending-table">
              <thead>
                <tr>
                  <th>Title</th>
                  <th>Status</th>
                  <th>Uploaded</th>
                  <th>Action</th>
                </tr>
              </thead>
              <tbody id="processedDocsTableBody">
{{ activity_table_body_html|safe }}
              </tbody>
            </table>
          </div>
          <h3>System Log</h3>
          <pre id="activityOutput" class="output">Ready.</pre>
        </article>
